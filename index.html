  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #064E3B; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #064E3B; z-index: 9999; }

  <noscript>
    <style>#__bundler_loading { display: none; }</style>
    <div style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">
      This page requires JavaScript to display.
    </div>
  </noscript>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // ====== CORBELLA BALANCE · Conexión a Supabase ======
    // 1) Project URL (Supabase -> Project Settings -> Data API)
    window.CB_SUPABASE_URL = 'https://uzldrfsejsaqtjmkyyff.supabase.co';
    // 2) Clave "Publishable key" (NUNCA la "Secret key")
    window.CB_SUPABASE_KEY = 'sb_publishable_bwTysOo-bqllO5O8yseHfQ_VgUguBlJ';
    window.CB_SUPA = window.supabase.createClient(window.CB_SUPABASE_URL, window.CB_SUPABASE_KEY);

    // ====== Módulo 2 · Clientes (helpers sobre Supabase) ======
    window.CBS = {
      async listPatients(coachId) {
        const { data, error } = await window.CB_SUPA.from('patients')
          .select('id, sex, birth_date, height_cm, weight_kg, goal, activity_level, status, start_date, notes, services, profiles!patients_id_fkey(full_name, email)')
          .eq('coach_id', coachId)
          .order('start_date', { ascending: false });
        if (error) { console.error(error); return []; }
        return (data || []).map(p => ({ ...p, name: (p.profiles && p.profiles.full_name) || '(sin nombre)', email: (p.profiles && p.profiles.email) || '' }));
      },
      async weeklyActivitySummary(coachId, fromDate) {
        const [s, c, n] = await Promise.all([
          window.CB_SUPA.from('workout_logs').select('patient_id').eq('coach_id', coachId).gte('date', fromDate),
          window.CB_SUPA.from('checkins').select('patient_id').eq('coach_id', coachId).gte('week_date', fromDate),
          window.CB_SUPA.from('nutrition_logs').select('patient_id').eq('coach_id', coachId).gte('date', fromDate),
        ]);
        return {
          trainedIds: new Set((s.data || []).map(r => r.patient_id)),
          checkinIds: new Set((c.data || []).map(r => r.patient_id)),
          nutritionIds: new Set((n.data || []).map(r => r.patient_id)),
        };
      },
      async countRecentSessions(coachId, sinceDateISO) {
        const { count, error } = await window.CB_SUPA.from('workout_logs').select('id', { count: 'exact', head: true }).eq('coach_id', coachId).gte('date', sinceDateISO);
        return error ? 0 : (count || 0);
      },
      async listAllSessionsByCoach(coachId) {
        const { data, error } = await window.CB_SUPA.from('workout_logs').select('patient_id, date').eq('coach_id', coachId);
        return error ? [] : data;
      },
      async findPatientProfileByEmail(email) {
        const clean = (email || '').trim().toLowerCase();
        const { data, error } = await window.CB_SUPA.from('profiles').select('id, full_name, email, role').eq('email', clean).maybeSingle();
        if (error || !data) return { error: 'No encontramos ninguna cuenta con ese correo. Primero créala en Supabase → Authentication → Add user.' };
        if (data.role !== 'patient') return { error: 'Esa cuenta no está marcada como paciente.' };
        const { data: existing } = await window.CB_SUPA.from('patients').select('id').eq('id', data.id).maybeSingle();
        if (existing) return { error: 'Esa persona ya está vinculada como tu paciente.' };
        return { profile: data };
      },
      async createPatient(profileId, coachId, ficha) {
        const { error } = await window.CB_SUPA.from('patients').insert({ id: profileId, coach_id: coachId, ...ficha });
        return { error: error ? error.message : null };
      },
      async setPatientName(profileId, fullName) {
        if (!fullName) return { error: null };
        const { error } = await window.CB_SUPA.from('profiles').update({ full_name: fullName }).eq('id', profileId);
        return { error: error ? error.message : null };
      },
      async updatePatient(id, ficha) {
        const { error } = await window.CB_SUPA.from('patients').update(ficha).eq('id', id);
        return { error: error ? error.message : null };
      },
      async deletePatient(id) {
        const { error } = await window.CB_SUPA.from('patients').delete().eq('id', id);
        return { error: error ? error.message : null };
      },
      _newId(prefix) { return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); },

      // ====== Módulo 3 · Catálogos ======
      async listMuscleGroups() {
        const { data, error } = await window.CB_SUPA.from('muscle_groups').select('name, region, parent, counts_as_volume').order('name');
        return error ? [] : data;
      },
      async listExercises() {
        const { data, error } = await window.CB_SUPA.from('exercises').select('id, name, muscle_group, load, video_url').order('muscle_group').order('name');
        return error ? [] : data;
      },
      async saveExercise(ex) {
        const row = { name: ex.name, muscle_group: ex.muscle_group, load: ex.load || 'moderada', video_url: ex.video_url || null };
        if (ex.id) { const { error } = await window.CB_SUPA.from('exercises').update(row).eq('id', ex.id); return { error: error ? error.message : null }; }
        const { error } = await window.CB_SUPA.from('exercises').insert({ id: window.CBS._newId('e'), ...row });
        return { error: error ? error.message : null };
      },
      async listFoods() {
        const { data, error } = await window.CB_SUPA.from('foods').select('*').order('name');
        return error ? [] : data;
      },
      async saveFood(f) {
        const row = { name: f.name, category: f.category || 'otro', kcal: +f.kcal || 0, protein: +f.protein || 0, carbs: +f.carbs || 0, fat: +f.fat || 0, base_unit: f.base_unit || 'g', household_measure: f.household_measure || null, portion_g: f.portion_g ? +f.portion_g : null };
        if (f.id) { const { error } = await window.CB_SUPA.from('foods').update(row).eq('id', f.id); return { error: error ? error.message : null }; }
        const { error } = await window.CB_SUPA.from('foods').insert({ id: window.CBS._newId('f'), ...row });
        return { error: error ? error.message : null };
      },
      async listMenus() {
        const { data, error } = await window.CB_SUPA.from('menus').select('id, name, slot, dish_type, image_url, menu_items(food_id, qty, foods(name, kcal, protein, carbs, fat, base_unit, category, household_measure, portion_g))').order('name');
        if (error) return [];
        return data.map(m => ({ ...m, items: (m.menu_items || []).map(it => ({ foodId: it.food_id, qty: it.qty, food: it.foods })) }));
      },
      async saveMenu(menu) {
        let menuId = menu.id;
        if (!menuId) {
          menuId = window.CBS._newId('m');
          const { error } = await window.CB_SUPA.from('menus').insert({ id: menuId, name: menu.name, slot: menu.slot, dish_type: menu.dishType || null, image_url: menu.imageUrl || null });
          if (error) return { error: error.message };
        } else {
          const { error } = await window.CB_SUPA.from('menus').update({ name: menu.name, slot: menu.slot, dish_type: menu.dishType || null, image_url: menu.imageUrl || null }).eq('id', menuId);
          if (error) return { error: error.message };
        }
        await window.CB_SUPA.from('menu_items').delete().eq('menu_id', menuId);
        const rows = (menu.items || []).map(it => ({ menu_id: menuId, food_id: it.foodId, qty: parseFloat(it.qty) || 0 }));
        if (rows.length) { const { error } = await window.CB_SUPA.from('menu_items').insert(rows); if (error) return { error: error.message }; }
        return { error: null };
      },
      async applyCheckinToPlan(patientId, kcalDelta, newSteps) {
        const plan = await this.getActiveNutritionPlan(patientId);
        if (!plan) return { error: 'No hay plan nutricional activo para este paciente' };
        const oldKcal = plan.kcal || 2000;
        const newKcal = Math.max(1000, oldKcal + (kcalDelta || 0));
        const ratio = newKcal / oldKcal;
        const patch = {
          kcal: newKcal,
          protein: Math.round((plan.protein || 0) * ratio),
          carbs: Math.round((plan.carbs || 0) * ratio),
          fat: Math.round((plan.fat || 0) * ratio),
        };
        if (newSteps != null && newSteps > 0) patch.steps = newSteps;
        const { error } = await window.CB_SUPA.from('nutrition_plans').update(patch).eq('id', plan.id);
        return { error: error ? error.message : null, oldKcal, newKcal };
      },
      async saveCoachNotes(patientId, notes) {
        const { error } = await window.CB_SUPA.from('patients').update({ coach_notes: notes }).eq('id', patientId);
        return { error: error ? error.message : null };
      },
      async getLastSessionSets(patientId, dayId, exerciseId) {
        // Busca el último workout_log anterior a este día para obtener los sets del ejercicio
        const { data } = await window.CB_SUPA.from('set_logs')
          .select('set_number, weight_kg, reps, rir, workout_logs!inner(date, program_day_id)')
          .eq('patient_id', patientId)
          .eq('exercise_id', exerciseId)
          .order('created_at', { ascending: false })
          .limit(6);
        return (data || []).map(s => ({ setNumber: s.set_number, weightKg: s.weight_kg, reps: s.reps, rir: s.rir }));
      },
      async listProgressPhotoRecords(patientId) {
        const { data, error } = await window.CB_SUPA.from('progress_photos')
          .select('id, date, angle, storage_path')
          .eq('patient_id', patientId)
          .order('date', { ascending: false });
        return error ? [] : (data || []);
      },
      async uploadMenuImage(menuId, blob) {
        const path = `${menuId}-${Date.now()}.jpg`;
        const { error: uploadErr } = await window.CB_SUPA.storage
          .from('menu-images').upload(path, blob, { upsert: true, contentType: 'image/jpeg' });
        if (uploadErr) return { error: uploadErr.message };
        const { data } = window.CB_SUPA.storage.from('menu-images').getPublicUrl(path);
        return { error: null, url: data ? data.publicUrl : null };
      },
      async uploadProgressPhoto(patientId, coachId, date, angle, blob) {
        const path = `${patientId}/${date}/${angle}.jpg`;
        const { error: uploadErr } = await window.CB_SUPA.storage
          .from('progress-photos').upload(path, blob, { upsert: true, contentType: 'image/jpeg' });
        if (uploadErr) return { error: uploadErr.message };
        const { error: dbErr } = await window.CB_SUPA.from('progress_photos')
          .upsert({ patient_id: patientId, coach_id: coachId, date, angle, storage_path: path },
                  { onConflict: 'patient_id,date,angle' });
        return { error: dbErr ? dbErr.message : null };
      },
      async listNutritionAdherence(patientId, fromDate) {
        const { data, error } = await window.CB_SUPA.from('nutrition_logs')
          .select('date, meal_name')
          .eq('patient_id', patientId)
          .gte('date', fromDate)
          .order('date');
        if (error) return [];
        // Agrupar por fecha: cuántas comidas registró cada día
        const byDate = {};
        (data || []).forEach(r => { byDate[r.date] = (byDate[r.date] || 0) + 1; });
        return Object.entries(byDate).map(([date, count]) => ({ date, count }));
      },
      async listNutritionPlans(patientId) {
        const { data, error } = await window.CB_SUPA.from('nutrition_plans')
          .select('id, patient_id, coach_id, name, status, start_date, end_date, kcal, protein, carbs, fat, water_ml, steps, notes, calc, created_at')
          .eq('patient_id', patientId).order('created_at', { ascending: false });
        if (error) return [];
        return data.map(p => ({ ...p, startDate: p.start_date, endDate: p.end_date, waterMl: p.water_ml, meals: [] }));
      },
      async getNutritionPlanWithMeals(planId, menus) {
        const { data: meals, error: me } = await window.CB_SUPA.from('plan_meals')
          .select('id, name, time, sort, plan_meal_options(id, menu_id, scale, custom_items)')
          .eq('nutrition_plan_id', planId).order('sort');
        if (me) return null;
        return (meals || []).map(m => ({
          id: m.id, name: m.name, time: m.time || '',
          options: (m.plan_meal_options || []).filter(o => o.menu_id).map(o => ({ id: o.menu_id, scale: o.scale ?? 1, customItems: o.custom_items || null })),
        }));
      },
      async saveNutritionPlan(patientId, coachId, plan) {
        const row = { patient_id: patientId, coach_id: coachId, name: plan.name, status: plan.status || 'draft',
          start_date: plan.startDate || null, end_date: plan.endDate || null,
          kcal: plan.kcal || null, protein: plan.protein || null, carbs: plan.carbs || null, fat: plan.fat || null,
          water_ml: plan.waterMl || null, steps: plan.steps || null, notes: plan.notes || '', calc: plan.calc || null };
        let planId = plan.id;
        if (!planId) {
          const { data, error } = await window.CB_SUPA.from('nutrition_plans').insert(row).select('id').single();
          if (error) return { error: error.message };
          planId = data.id;
        } else {
          const { error } = await window.CB_SUPA.from('nutrition_plans').update(row).eq('id', planId);
          if (error) return { error: error.message };
          await window.CB_SUPA.from('plan_meals').delete().eq('nutrition_plan_id', planId);
        }
        const meals = plan.meals || [];
        for (let i = 0; i < meals.length; i++) {
          const m = meals[i];
          const { data: mRow, error: me } = await window.CB_SUPA.from('plan_meals')
            .insert({ nutrition_plan_id: planId, patient_id: patientId, coach_id: coachId, name: m.name, time: m.time || '', sort: i })
            .select('id').single();
          if (me) continue;
          // options = [{id: menuId, scale: 1, customItems?: [{foodId, qty}]}] o string legacy
          const opts = (m.options || []).filter(Boolean).map(o => {
            const menuId = typeof o === 'string' ? o : o.id;
            const scale = typeof o === 'object' ? (o.scale ?? 1) : 1;
            const customItems = (typeof o === 'object' && o.customItems && o.customItems.length) ? o.customItems : null;
            return { plan_meal_id: mRow.id, patient_id: patientId, coach_id: coachId, menu_id: menuId, scale, custom_items: customItems };
          });
          if (opts.length) await window.CB_SUPA.from('plan_meal_options').insert(opts);
        }
        return { error: null, planId };
      },
      async activateNutritionPlan(planId, patientId, coachId) {
        await window.CB_SUPA.from('nutrition_plans').update({ status: 'archived' }).eq('patient_id', patientId).eq('status', 'active');
        const { error } = await window.CB_SUPA.from('nutrition_plans').update({ status: 'active' }).eq('id', planId);
        return { error: error ? error.message : null };
      },
      async deleteNutritionPlan(planId) {
        const { error } = await window.CB_SUPA.from('nutrition_plans').delete().eq('id', planId);
        return { error: error ? error.message : null };
      },
      async getActiveNutritionPlan(patientId) {
        const { data, error } = await window.CB_SUPA.from('nutrition_plans')
          .select('id, name, status, coach_id, start_date, end_date, kcal, protein, carbs, fat, water_ml, steps, notes, calc')
          .eq('patient_id', patientId).eq('status', 'active').maybeSingle();
        if (error || !data) return null;
        const { data: meals } = await window.CB_SUPA.from('plan_meals')
          .select('id, name, time, sort, plan_meal_options(menu_id, scale, custom_items)')
          .eq('nutrition_plan_id', data.id).order('sort');
        return { ...data, startDate: data.start_date, endDate: data.end_date, waterMl: data.water_ml,
          meals: (meals || []).map(m => ({ id: m.id, name: m.name, time: m.time || '',
            options: (m.plan_meal_options || []).filter(o => o.menu_id).map(o => ({ id: o.menu_id, scale: o.scale ?? 1, customItems: o.custom_items || null })) })) };
      },
      async listMenuExclusions(patientId) {
        const { data, error } = await window.CB_SUPA.from('patient_menu_exclusions').select('menu_id').eq('patient_id', patientId);
        return error ? [] : (data || []).map(x => x.menu_id);
      },
      async toggleMenuExclusion(patientId, coachId, menuId, exclude) {
        if (exclude) {
          const { error } = await window.CB_SUPA.from('patient_menu_exclusions').upsert({ patient_id: patientId, coach_id: coachId, menu_id: menuId }, { onConflict: 'patient_id,menu_id' });
          return { error: error ? error.message : null };
        } else {
          const { error } = await window.CB_SUPA.from('patient_menu_exclusions').delete().eq('patient_id', patientId).eq('menu_id', menuId);
          return { error: error ? error.message : null };
        }
      },
      async saveMealEquivalences(planMealId, patientId, coachId, equivalences) {
        await window.CB_SUPA.from('plan_meal_equivalences').delete().eq('plan_meal_id', planMealId);
        const rows = equivalences.filter(e => parseFloat(e.portions) > 0).map(e => ({
          plan_meal_id: planMealId, patient_id: patientId, coach_id: coachId,
          group_name: e.group_name, portions: parseFloat(e.portions)
        }));
        if (rows.length) { const { error } = await window.CB_SUPA.from('plan_meal_equivalences').insert(rows); if (error) return { error: error.message }; }
        return { error: null };
      },
      async getMealEquivalences(planMealId) {
        const { data, error } = await window.CB_SUPA.from('plan_meal_equivalences')
          .select('group_name, portions').eq('plan_meal_id', planMealId);
        return error ? [] : (data || []);
      },
      async listFoodsWithPortions(category) {
        let q = window.CB_SUPA.from('foods')
          .select('id, name, kcal, protein, carbs, fat, portion_g, category, base_unit, household_measure')
          .not('portion_g', 'is', null).order('name');
        if (category) q = q.eq('category', category);
        const { data, error } = await q;
        return error ? [] : (data || []);
      },
      async listWeights(patientId, limitDays) {
        let q = window.CB_SUPA.from('body_metrics').select('id, date, value').eq('patient_id', patientId).eq('type', 'weight').order('date', { ascending: true });
        if (limitDays) { const since = new Date(Date.now() - limitDays * 86400000).toISOString().slice(0, 10); q = q.gte('date', since); }
        const { data, error } = await q;
        return error ? [] : (data || []).map(r => ({ id: r.id, date: r.date, weightKg: r.value }));
      },
      async logWeight(patientId, coachId, date, weightKg) {
        const { data: ex } = await window.CB_SUPA.from('body_metrics').select('id').eq('patient_id', patientId).eq('type', 'weight').eq('date', date).maybeSingle();
        if (ex) { const { error } = await window.CB_SUPA.from('body_metrics').update({ value: weightKg }).eq('id', ex.id); return { error: error ? error.message : null }; }
        const { error } = await window.CB_SUPA.from('body_metrics').insert({ patient_id: patientId, coach_id: coachId, date, type: 'weight', value: weightKg, unit: 'kg' });
        return { error: error ? error.message : null };
      },
      async listMeasurements(patientId) {
        const { data, error } = await window.CB_SUPA.from('body_metrics').select('id, date, waist, hip, arm, thigh, neck').eq('patient_id', patientId).eq('type', 'tape').order('date', { ascending: false });
        return error ? [] : (data || []);
      },
      async logMeasurements(patientId, coachId, date, fields) {
        const { data: ex } = await window.CB_SUPA.from('body_metrics').select('id').eq('patient_id', patientId).eq('type', 'tape').eq('date', date).maybeSingle();
        if (ex) { const { error } = await window.CB_SUPA.from('body_metrics').update(fields).eq('id', ex.id); return { error: error ? error.message : null }; }
        const { error } = await window.CB_SUPA.from('body_metrics').insert({ patient_id: patientId, coach_id: coachId, date, type: 'tape', ...fields });
        return { error: error ? error.message : null };
      },
      async listWeightDates(patientId) {
        const { data, error } = await window.CB_SUPA.from('body_metrics').select('date').eq('patient_id', patientId).eq('type', 'weight');
        return error ? [] : (data || []).map(r => r.date);
      },
      async getNutritionLogs(patientId, date) {
        const { data, error } = await window.CB_SUPA.from('nutrition_logs').select('id, meal_name, menu_id, kcal, protein, carbs, fat, logged_at').eq('patient_id', patientId).eq('date', date);
        return error ? [] : (data || []);
      },
      async logMeal(patientId, coachId, date, mealName, menuId, macros) {
        const row = { patient_id: patientId, coach_id: coachId, date, meal_name: mealName, menu_id: menuId || null, kcal: Math.round(macros.kcal || 0), protein: Math.round(macros.protein || 0), carbs: Math.round(macros.carbs || 0), fat: Math.round(macros.fat || 0), logged_at: new Date().toISOString() };
        const { error } = await window.CB_SUPA.from('nutrition_logs').upsert(row, { onConflict: 'patient_id,meal_name,date' });
        return { error: error ? error.message : null };
      },
      async deleteMealLog(id) {
        const { error } = await window.CB_SUPA.from('nutrition_logs').delete().eq('id', id);
        return { error: error ? error.message : null };
      },
      async listHabits() {
        const { data, error } = await window.CB_SUPA.from('habits').select('*').order('name');
        return error ? [] : data;
      },
      async saveHabit(h) {
        const row = { name: h.name, icon: h.icon || '⭐', type: h.type || 'boolean', target: parseFloat(h.target) || 1, unit: h.unit || '' };
        if (h.id) { const { error } = await window.CB_SUPA.from('habits').update(row).eq('id', h.id); return { error: error ? error.message : null }; }
        const { error } = await window.CB_SUPA.from('habits').insert({ id: window.CBS._newId('h'), ...row });
        return { error: error ? error.message : null };
      },

      // ====== Módulo 5 · Hábitos del paciente (asignación + registro real) ======
      async listAssignedHabits(patientId) {
        const { data, error } = await window.CB_SUPA.from('habit_assignments').select('id, habit_id, active, habits(id, name, icon, type, target, unit)').eq('patient_id', patientId).eq('active', true);
        if (error) return [];
        return data.filter(a => a.habits).map(a => ({ id: a.id, habitId: a.habit_id, habit: a.habits }));
      },
      async toggleHabitAssignment(patientId, coachId, habitId, currentlyAssigned) {
        const { data: existing } = await window.CB_SUPA.from('habit_assignments').select('id, active').eq('patient_id', patientId).eq('habit_id', habitId).maybeSingle();
        if (existing) { const { error } = await window.CB_SUPA.from('habit_assignments').update({ active: !currentlyAssigned }).eq('id', existing.id); return { error: error ? error.message : null }; }
        const { error } = await window.CB_SUPA.from('habit_assignments').insert({ patient_id: patientId, coach_id: coachId, habit_id: habitId, active: true });
        return { error: error ? error.message : null };
      },
      async listHabitLogs(patientId, sinceDateISO) {
        const { data, error } = await window.CB_SUPA.from('habit_logs').select('habit_assignment_id, date, value, done').eq('patient_id', patientId).gte('date', sinceDateISO);
        return error ? [] : data;
      },
      async logHabit(assignmentId, patientId, coachId, date, patch) {
        const { error } = await window.CB_SUPA.from('habit_logs').upsert({ habit_assignment_id: assignmentId, patient_id: patientId, coach_id: coachId, date, ...patch }, { onConflict: 'habit_assignment_id,date' });
        return { error: error ? error.message : null };
      },

      // ====== Módulo 6 · Mensajería real (paciente ↔ coach, sobre Supabase) ======
      async listMessages(patientId) {
        const { data, error } = await window.CB_SUPA.from('messages').select('id, sender_id, body, read, created_at').eq('patient_id', patientId).order('created_at', { ascending: true });
        return error ? [] : data;
      },
      async sendMessage(patientId, coachId, senderId, body) {
        const { error } = await window.CB_SUPA.from('messages').insert({ patient_id: patientId, coach_id: coachId, sender_id: senderId, body });
        return { error: error ? error.message : null };
      },
      async markMessagesRead(patientId, readerId) {
        await window.CB_SUPA.from('messages').update({ read: true }).eq('patient_id', patientId).neq('sender_id', readerId).eq('read', false);
      },
      async listMessageThreadsByCoach(coachId) {
        const { data, error } = await window.CB_SUPA.from('messages').select('patient_id, sender_id, body, read, created_at').eq('coach_id', coachId).order('created_at', { ascending: true });
        return error ? [] : data;
      },

      // ====== Módulo 7 · Check-ins semanales reales (paciente llena · coach revisa) ======
      async listCheckins(patientId) {
        const { data, error } = await window.CB_SUPA.from('checkins').select('id, week_number, week_date, status, weight, patient_difficult, patient_comment, coach_adj_nutrition, coach_adj_steps, coach_adj_cardio, coach_adj_training, coach_feedback, submitted_at, reviewed_at, created_at, checkin_answers(question_key, value)').eq('patient_id', patientId).order('week_number', { ascending: false });
        if (error) return [];
        return data.map(c => ({ ...c, scores: Object.fromEntries((c.checkin_answers || []).map(a => [a.question_key, a.value])) }));
      },
      async submitCheckin(patientId, coachId, weekNumber, payload) {
        const { data, error } = await window.CB_SUPA.from('checkins').insert({ patient_id: patientId, coach_id: coachId, week_number: weekNumber, week_date: new Date().toISOString().slice(0, 10), weight: payload.weight, patient_difficult: payload.dificil, patient_comment: payload.comentario, status: 'submitted', submitted_at: new Date().toISOString() }).select('id').single();
        if (error) return { error: error.message };
        const rows = Object.entries(payload.scores).filter(([, v]) => v != null).map(([k, v]) => ({ checkin_id: data.id, patient_id: patientId, coach_id: coachId, question_key: k, value: v }));
        if (rows.length) { const { error: e2 } = await window.CB_SUPA.from('checkin_answers').insert(rows); if (e2) return { error: e2.message }; }
        return { error: null };
      },
      async saveCheckinAdjustments(checkinId, patch) {
        const { error } = await window.CB_SUPA.from('checkins').update({ ...patch, status: 'reviewed', reviewed_at: new Date().toISOString() }).eq('id', checkinId);
        return { error: error ? error.message : null };
      },

      // ====== Módulo 4 · Entrenamiento (paciente: lectura · coach: lectura+escritura) ======
      async getPatient(id) {
        const { data, error } = await window.CB_SUPA.from('patients').select('id, coach_id, sex, birth_date, height_cm, weight_kg, goal, activity_level, status, start_date, notes, coach_notes, services, profiles!patients_id_fkey(full_name, email)').eq('id', id).maybeSingle();
        if (error || !data) return null;
        const name = (data.profiles && data.profiles.full_name) || (data.profiles && data.profiles.email) || 'Paciente';
        const email = (data.profiles && data.profiles.email) || '';
        return { ...data, name, email, avatar: name.split(' ').map(x => x[0]).slice(0, 2).join('').toUpperCase(), birthDate: data.birth_date, heightCm: data.height_cm, weightKg: data.weight_kg, activity: data.activity_level, startDate: data.start_date, coachNotes: data.coach_notes || '' };
      },
      async getActiveProgram(patientId) {
        const { data: prog, error } = await window.CB_SUPA.from('programs').select('*').eq('patient_id', patientId).eq('status', 'active').order('created_at', { ascending: false }).limit(1).maybeSingle();
        if (error || !prog) return null;
        const { data: weeks } = await window.CB_SUPA.from('program_weeks').select('id, week_number, block, phase, is_deload').eq('program_id', prog.id).order('week_number');
        const weekIds = (weeks || []).map(w => w.id);
        const { data: days } = weekIds.length ? await window.CB_SUPA.from('program_days').select('id, program_week_id, day_index, name, est_duration_min, warmup, cardio').in('program_week_id', weekIds).order('day_index') : { data: [] };
        const dayIds = (days || []).map(d => d.id);
        const { data: exs } = dayIds.length ? await window.CB_SUPA.from('program_exercises').select('id, program_day_id, exercise_id, sets, reps, rir, target_rpe, load, rest_sec, weight_ref, notes, sort, section, combo_type, combo_group, exercises(name, muscle_group, video_url)').in('program_day_id', dayIds) : { data: [] };
        const { data: logs } = dayIds.length ? await window.CB_SUPA.from('workout_logs').select('program_day_id, week_number').eq('patient_id', patientId) : { data: [] };
        const doneSet = new Set((logs || []).map(l => l.week_number + '-' + l.program_day_id));
        const weeksOut = (weeks || []).map(w => ({
          week: w.week_number, id: w.id, phase: w.phase, block: w.block,
          days: (days || []).filter(d => d.program_week_id === w.id).map(d => ({
            id: d.id, name: d.name, dayIndex: d.day_index, estDurationMin: d.est_duration_min, warmup: d.warmup, cardio: d.cardio, done: doneSet.has(w.week_number + '-' + d.id),
            exercises: (exs || []).filter(e => e.program_day_id === d.id).sort((a, b) => (a.sort || 0) - (b.sort || 0)).map(e => ({
              id: e.id, exerciseId: e.exercise_id, sets: e.sets, reps: e.reps, rir: e.rir, targetRpe: e.target_rpe, load: e.load, restSec: e.rest_sec, weightRef: e.weight_ref, notes: e.notes, section: e.section || 'principal', comboType: e.combo_type || 'normal', comboGroup: e.combo_group || null,
              name: e.exercises ? e.exercises.name : '(ejercicio eliminado)', group: e.exercises ? e.exercises.muscle_group : '', video: e.exercises ? e.exercises.video_url : '',
            })),
          })),
        }));
        return { ...prog, weeksTotal: prog.weeks_total, daysPerWeek: prog.days_per_week, startDate: prog.start_date, weeks: weeksOut };
      },
      async createProgram(patientId, coachId, cfg) {
        await window.CB_SUPA.from('programs').update({ status: 'archived' }).eq('patient_id', patientId).eq('status', 'active');
        const { data: prog, error } = await window.CB_SUPA.from('programs').insert({ patient_id: patientId, coach_id: coachId, name: cfg.name, status: 'active', level: cfg.level || 'I', weeks_total: cfg.weeksTotal, days_per_week: cfg.daysPerWeek, split: cfg.split, start_date: cfg.startDate, notes: cfg.notes || '' }).select().single();
        if (error) return { error: error.message };
        const weekRows = []; for (let w = 1; w <= cfg.weeksTotal; w++) weekRows.push({ program_id: prog.id, patient_id: patientId, coach_id: coachId, week_number: w });
        const { data: weeks, error: e2 } = await window.CB_SUPA.from('program_weeks').insert(weekRows).select();
        if (e2) return { error: e2.message };
        const names = cfg.dayNames || [];
        const dayRows = [];
        weeks.forEach(w => { for (let di = 0; di < cfg.daysPerWeek; di++) dayRows.push({ program_week_id: w.id, patient_id: patientId, coach_id: coachId, day_index: di, name: names[di] || ('Día ' + (di + 1)) }); });
        const { error: e3 } = await window.CB_SUPA.from('program_days').insert(dayRows);
        if (e3) return { error: e3.message };
        return { error: null, programId: prog.id };
      },
      async saveProgramExercise(dayId, patientId, coachId, dx) {
        const row = { exercise_id: dx.exerciseId, sets: parseInt(dx.sets) || 1, reps: dx.reps, rir: parseInt(dx.rir) || 0, target_rpe: dx.targetRpe === '' || dx.targetRpe == null ? null : parseFloat(dx.targetRpe), load: dx.load || 'moderada', rest_sec: parseInt(dx.restSec) || 60, weight_ref: parseFloat(dx.weightRef) || null, notes: dx.notes || '', section: dx.section || 'principal' };
        if (dx.id) { const { error } = await window.CB_SUPA.from('program_exercises').update(row).eq('id', dx.id); return { error: error ? error.message : null }; }
        const { error } = await window.CB_SUPA.from('program_exercises').insert({ program_day_id: dayId, patient_id: patientId, coach_id: coachId, ...row });
        return { error: error ? error.message : null };
      },
      async reorderExercises(updates) {
        await Promise.all(updates.map(u => window.CB_SUPA.from('program_exercises').update({ sort: u.sort }).eq('id', u.id)));
        return { error: null };
      },
      async deleteProgramExercise(id) {
        const { error } = await window.CB_SUPA.from('program_exercises').delete().eq('id', id);
        return { error: error ? error.message : null };
      },

      // ====== Módulo 4b · Dosificación, Periodización, reparto por sesión ======
      async getDosificacionData(programId) {
        const { data: vt } = await window.CB_SUPA.from('volume_targets').select('muscle_group, priority, min_sets, max_sets, target_sets').eq('program_id', programId);
        const volumeTargets = {}; (vt || []).forEach(r => volumeTargets[r.muscle_group] = r);
        const { data: dp } = await window.CB_SUPA.from('day_plan').select('week_number, day_index, muscle_group, sets').eq('program_id', programId);
        const dayPlan = {}; (dp || []).forEach(r => { const k = r.week_number + '-' + r.day_index; if (!dayPlan[k]) dayPlan[k] = {}; dayPlan[k][r.muscle_group] = r.sets; });
        const { data: wk } = await window.CB_SUPA.from('program_weeks').select('week_number, target_sets').eq('program_id', programId);
        const weekTargets = {}; (wk || []).forEach(r => { if (r.target_sets != null) weekTargets[r.week_number] = r.target_sets; });
        return { volumeTargets, dayPlan, weekTargets };
      },
      async setVolumeTarget(programId, patientId, coachId, muscleGroup, patch) {
        const { data: existing } = await window.CB_SUPA.from('volume_targets').select('id').eq('program_id', programId).eq('muscle_group', muscleGroup).maybeSingle();
        if (existing) { const { error } = await window.CB_SUPA.from('volume_targets').update(patch).eq('id', existing.id); return { error: error ? error.message : null }; }
        const { error } = await window.CB_SUPA.from('volume_targets').insert({ program_id: programId, patient_id: patientId, coach_id: coachId, muscle_group: muscleGroup, ...patch });
        return { error: error ? error.message : null };
      },
      async setDayPlanCell(programId, patientId, coachId, weekNumber, dayIndex, muscleGroup, sets) {
        const { data: existing } = await window.CB_SUPA.from('day_plan').select('id').eq('program_id', programId).eq('week_number', weekNumber).eq('day_index', dayIndex).eq('muscle_group', muscleGroup).maybeSingle();
        if (existing) { const { error } = await window.CB_SUPA.from('day_plan').update({ sets }).eq('id', existing.id); return { error: error ? error.message : null }; }
        const { error } = await window.CB_SUPA.from('day_plan').insert({ program_id: programId, patient_id: patientId, coach_id: coachId, week_number: weekNumber, day_index: dayIndex, muscle_group: muscleGroup, sets });
        return { error: error ? error.message : null };
      },
      async propagateDayPlan(programId, patientId, coachId, baseCells, targetWeeks, pct, fromWeek) {
        // baseCells: [{dayIndex, muscleGroup, sets}] de la semana de referencia (solo valores > 0)
        const rows = [];
        targetWeeks.forEach(w => {
          const factor = Math.pow(1 + (pct || 0) / 100, w - fromWeek);
          baseCells.forEach(c => rows.push({ program_id: programId, patient_id: patientId, coach_id: coachId, week_number: w, day_index: c.dayIndex, muscle_group: c.muscleGroup, sets: Math.round(c.sets * factor) }));
        });
        if (!rows.length) return { error: null };
        const { error } = await window.CB_SUPA.from('day_plan').upsert(rows, { onConflict: 'program_id,week_number,day_index,muscle_group' });
        return { error: error ? error.message : null };
      },
      async propagateProgramExercises(targetDayIds, rows) {
        // Copia el programa de ejercicios de una semana hacia otras: reemplaza (borra + inserta) en las semanas destino.
        if (targetDayIds.length) { const { error: delErr } = await window.CB_SUPA.from('program_exercises').delete().in('program_day_id', targetDayIds); if (delErr) return { error: delErr.message }; }
        if (rows.length) { const { error } = await window.CB_SUPA.from('program_exercises').insert(rows); if (error) return { error: error.message }; }
        return { error: null };
      },
      async setWeekMeta(weekId, patch) {
        const { error } = await window.CB_SUPA.from('program_weeks').update(patch).eq('id', weekId);
        return { error: error ? error.message : null };
      },
      async setProgramMeta(programId, patch) {
        const { error } = await window.CB_SUPA.from('programs').update(patch).eq('id', programId);
        return { error: error ? error.message : null };
      },
      async renameProgramDays(programId, weekIds, names) {
        for (let di = 0; di < names.length; di++) { await window.CB_SUPA.from('program_days').update({ name: names[di] }).in('program_week_id', weekIds).eq('day_index', di); }
        return { error: null };
      },
      async bulkUpdateWeeks(weekPatches) { // [{id, ...patch}]
        let firstError = null;
        for (const w of weekPatches) { const { id, ...patch } = w; const { error } = await window.CB_SUPA.from('program_weeks').update(patch).eq('id', id); if (error && !firstError) firstError = error.message; }
        return { error: firstError };
      },
      async setDayMeta(dayId, patch) {
        const { error } = await window.CB_SUPA.from('program_days').update(patch).eq('id', dayId);
        return { error: error ? error.message : null };
      },

      // ====== Módulo 4c · Registro real del paciente (workout_logs / set_logs) ======
      async listWorkoutLogs(programId) {
        const { data, error } = await window.CB_SUPA.from('workout_logs').select('id, program_day_id, week_number, date, session_rpe, duration_min, notes, program_days(name), set_logs(exercise_id, set_number, weight_kg, reps, rir, exercises(name))').eq('program_id', programId).order('date', { ascending: false });
        if (error) return [];
        return data.map(l => ({ ...l, dayName: l.program_days ? l.program_days.name : '', sets: (l.set_logs || []).sort((a, b) => a.set_number - b.set_number) }));
      },
      async getWorkoutLog(programDayId, weekNumber, patientId) {
        const { data: log } = await window.CB_SUPA.from('workout_logs').select('*').eq('program_day_id', programDayId).eq('week_number', weekNumber).eq('patient_id', patientId).maybeSingle();
        if (!log) return null;
        const { data: sets } = await window.CB_SUPA.from('set_logs').select('exercise_id, set_number, weight_kg, reps, rir').eq('workout_log_id', log.id);
        return { ...log, sets: sets || [] };
      },
      async saveWorkoutSession(patientId, coachId, programId, dayId, weekNumber, session) {
        // session: { date, sessionRpe, durationMin, notes, sets: [{exerciseId, setNumber, weightKg, reps, rir}] }
        const { data: existing } = await window.CB_SUPA.from('workout_logs').select('id').eq('program_day_id', dayId).eq('week_number', weekNumber).eq('patient_id', patientId).maybeSingle();
        let logId = existing && existing.id;
        const row = { patient_id: patientId, coach_id: coachId, program_id: programId, program_day_id: dayId, week_number: weekNumber, date: session.date, session_rpe: session.sessionRpe || null, duration_min: session.durationMin || null, notes: session.notes || '', cardio_min: session.cardioMin || null, cardio_rpe: session.cardioRpe || null };
        if (logId) { const { error } = await window.CB_SUPA.from('workout_logs').update(row).eq('id', logId); if (error) return { error: error.message }; }
        else { const { data, error } = await window.CB_SUPA.from('workout_logs').insert(row).select().single(); if (error) return { error: error.message }; logId = data.id; }
        await window.CB_SUPA.from('set_logs').delete().eq('workout_log_id', logId);
        const rows = (session.sets || []).map(s => ({ workout_log_id: logId, patient_id: patientId, coach_id: coachId, exercise_id: s.exerciseId, set_number: s.setNumber, weight_kg: s.weightKg === '' ? null : parseFloat(s.weightKg), reps: s.reps === '' ? null : parseInt(s.reps), rir: s.rir === '' ? null : parseInt(s.rir) }));
        if (rows.length) { const { error } = await window.CB_SUPA.from('set_logs').insert(rows); if (error) return { error: error.message }; }
        // Actualizar weight_ref automáticamente con el peso máximo usado por ejercicio
        const byExercise = {};
        (session.sets || []).forEach(s => {
          const w = parseFloat(s.weightKg);
          if (!isNaN(w) && w > 0) {
            if (!byExercise[s.exerciseId] || w > byExercise[s.exerciseId]) byExercise[s.exerciseId] = w;
          }
        });
        for (const [exerciseId, maxW] of Object.entries(byExercise)) {
          await window.CB_SUPA.from('program_exercises').update({ weight_ref: maxW }).eq('program_day_id', dayId).eq('exercise_id', exerciseId).eq('patient_id', patientId);
        }
        return { error: null, logId };
      },
    };
  </script>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
